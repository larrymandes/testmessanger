  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Генерируем версию
      - name: Generate version
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M')-$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter create . --platforms=android
      - run: flutter pub get
      - run: flutter build apk --release
      
      # Переименовываем APK с версией
      - name: Rename APK with version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/beta_chat-$VERSION.apk
          echo "Renamed to: beta_chat-$VERSION.apk"
      
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.version.outputs.VERSION }}
          path: build/app/outputs/flutter-apk/beta_chat-*.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      # Генерируем версию
      - name: Generate version
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M')-$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter create . --platforms=ios
      - run: flutter pub get
      - name: Add iOS permissions
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Для сканирования QR-кодов контактов'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Для сохранения QR-кодов'" ios/Runner/Info.plist || true
      - name: Disable code signing in Podfile
        run: |
          # Вставляем код отключения signing в существующий post_install
          perl -i -pe 's/(post_install do \|installer\|)/$1\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\n      config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\n      config.build_settings["CODE_SIGN_IDENTITY"] = ""\n    end\n  end/' ios/Podfile
      - name: Install pods
        run: cd ios && pod install
      - run: flutter clean
      - name: Build iOS without codesign
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cd Payload
          ln -s ../Runner.app
          cd ..
          zip -r app.ipa Payload
      
      # Переименовываем IPA с версией
      - name: Rename IPA with version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mv build/ios/iphoneos/app.ipa build/ios/iphoneos/beta_chat-$VERSION.ipa
          echo "Renamed to: beta_chat-$VERSION.ipa"
      
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned-${{ steps.version.outputs.VERSION }}
          path: build/ios/iphoneos/beta_chat-*.ipa
