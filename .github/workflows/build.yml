name: Build Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter create . --platforms=windows
      - run: flutter clean
      - run: flutter pub get
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/windows/x64/runner/Release/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter create . --platforms=android
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter create . --platforms=ios
      - run: flutter pub get
      - name: Add iOS permissions
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Для сканирования QR-кодов контактов'" ios/Runner/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Для сохранения QR-кодов'" ios/Runner/Info.plist || true
      - name: Modify Podfile to disable code signing
        run: |
          # Находим строку с post_install и добавляем наши настройки внутрь
          sed -i '' '/post_install do |installer|/a\
          \    installer.pods_project.targets.each do |target|\
          \      target.build_configurations.each do |config|\
          \        config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"\
          \        config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"\
          \        config.build_settings["CODE_SIGN_IDENTITY"] = ""\
          \      end\
          \    end
          ' ios/Podfile
      - name: Install pods
        run: cd ios && pod install
      - run: flutter clean
      - name: Build iOS without codesign
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cd Payload
          ln -s ../Runner.app
          cd ..
          zip -r app.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-unsigned
          path: build/ios/iphoneos/app.ipa
