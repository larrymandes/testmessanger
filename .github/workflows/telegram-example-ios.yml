name: Build Telegram UI Kit Example (iOS)

on:
  push:
    branches: [ main, master ]
    paths:
      - 'telegram_ios_ui_kit-2.26.0/example/**'
      - '.github/workflows/telegram-example-ios.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-telegram-example-ios:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate version
        id: version
        run: |
          VERSION="v$(date +'%Y.%m.%d-%H%M')-$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Flutter doctor
        run: flutter doctor -v
      
      - name: Remove existing iOS folder
        working-directory: telegram_ios_ui_kit-2.26.0/example
        run: rm -rf ios
      
      - name: Create iOS project
        working-directory: telegram_ios_ui_kit-2.26.0/example
        run: flutter create . --platforms=ios
      
      - name: Get dependencies
        working-directory: telegram_ios_ui_kit-2.26.0/example
        run: flutter pub get
      
      - name: Build iOS without codesign
        working-directory: telegram_ios_ui_kit-2.26.0/example
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA
        working-directory: telegram_ios_ui_kit-2.26.0/example
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          VERSION="${{ steps.version.outputs.VERSION }}"
          zip -r telegram_ui_kit_example-$VERSION.ipa Payload
      
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: telegram-ui-kit-example-ios-${{ steps.version.outputs.VERSION }}
          path: telegram_ios_ui_kit-2.26.0/example/build/ios/iphoneos/telegram_ui_kit_example-*.ipa
          retention-days: 30
      
      - name: Upload Runner.app
        uses: actions/upload-artifact@v4
        with:
          name: telegram-ui-kit-example-runner-app-${{ steps.version.outputs.VERSION }}
          path: telegram_ios_ui_kit-2.26.0/example/build/ios/iphoneos/Runner.app
          retention-days: 30

