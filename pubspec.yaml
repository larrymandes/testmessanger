name: secure_messenger
description: E2EE messenger over email without servers
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  flutter_chat_ui: ^1.6.15
  
  # Email protocols
  enough_mail: ^2.1.8  # IMAP/SMTP
  
  # Crypto
  cryptography: ^2.7.0
  pointycastle: ^3.9.1
  
  # Storage
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  
  # QR codes
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  
  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
